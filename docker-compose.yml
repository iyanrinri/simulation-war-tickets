version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: ticket_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket_backend
    command: npm run start:dev
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticket_frontend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_PORT=${BACKEND_PORT:-3000}
    depends_on:
      - backend
    restart: always
